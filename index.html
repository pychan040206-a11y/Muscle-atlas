<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MuscleAtlas" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <title>MUSCLE ATLAS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#0f766e;--purple:#9333ea;--bg:#0a0a0a;--surface:#141414;--border:#222;--text1:#eee;--text2:#777;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    html,body,#root{height:100%;background:var(--bg);color:var(--text1);font-family:'Noto Sans KR',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    input:focus{outline:none}button{cursor:pointer;-webkit-tap-highlight-color:transparent}button:active{transform:scale(0.97)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .app{max-width:480px;margin:0 auto;padding-bottom:calc(24px + var(--safe-bottom))}
    .header{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-top)) 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
    .header h1{font-family:'Bebas Neue','Noto Sans KR',sans-serif;font-size:20px;letter-spacing:3px;font-weight:400}
    .logo-mark{color:var(--accent);font-size:22px;width:48px;text-align:center}
    .count-badge{background:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;color:#fff;width:48px;text-align:center}
    .back-btn{background:none;border:none;color:var(--accent);font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;width:48px;text-align:left}
    .body{padding:16px}
    .search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 14px;margin-bottom:6px}
    .search-icon{color:var(--text2);font-size:18px}
    .search-input{flex:1;background:transparent;border:none;padding:14px 0;color:var(--text1);font-size:15px;font-family:'Noto Sans KR',sans-serif}
    .clear-btn{background:none;border:none;color:var(--text2);font-size:14px;padding:4px}
    .hint{font-size:11px;color:var(--text2);margin-bottom:20px;padding-left:4px}
    .no-result{text-align:center;color:var(--text2);padding:40px 0;font-size:14px}
    .result-count{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:8px}
    .list{display:flex;flex-direction:column;gap:6px}
    .card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;animation:fadeUp .3s ease both}
    .card:active{background:#1a1a1a}
    .card-name{font-size:15px;font-weight:700;margin-bottom:2px}
    .card-sub{font-size:12px;color:var(--text2)}
    .card-arrow{color:var(--accent);font-size:16px;font-weight:700}
    .browse-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .region-group{margin-bottom:20px}
    .region-label{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:.5px;border-left:3px solid var(--accent);padding-left:8px}
    .region-count{color:var(--text2);font-weight:400;font-size:12px}
    .name-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:16px;text-align:center}
    .name-en{font-size:20px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
    .name-kr-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .name-kr-new{font-size:16px;font-weight:700;color:var(--accent)}
    .name-kr-old{font-size:14px;color:var(--text2);align-self:center}
    .region-badge{display:inline-block;margin-top:10px;background:var(--border);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--text2);font-weight:500}
    .filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif}
    .filter-active{background:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:6px 14px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700}
    .term-block{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
    .term-label{font-size:13px;font-weight:700;margin-bottom:12px;letter-spacing:.5px}
    .term-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;line-height:1.5}
    .term-tag{flex-shrink:0;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;color:#fff;min-width:44px;text-align:center}
    .term-text{font-size:14px;line-height:1.6}
    .disclaimer{font-size:11px;color:var(--text2);line-height:1.6;padding:20px 0;border-top:1px solid var(--border);margin-top:20px}
  </style>
</head>

<div id="root"></div>

<script>
var MUSCLES=[
{en:"Occipitofrontalis (Frontalis)",oldKr:"전두근",newKr:"이마근",region:"머리·얼굴",origin:{en:"Epicranial aponeurosis (galea aponeurotica)",newKr:"머리덮개널힘줄(모상건막)",oldKr:"모상건막"},insertion:{en:"Skin and subcutaneous tissue of eyebrow and forehead",newKr:"눈썹 및 이마 피부·피하조직",oldKr:"눈썹 및 이마 피부·피하조직"}},
{en:"Occipitofrontalis (Occipitalis)",oldKr:"후두근",newKr:"뒤통수근",region:"머리·얼굴",origin:{en:"Lateral 2/3 of superior nuchal line, mastoid process of temporal bone",newKr:"위목덜미선 가쪽 2/3, 관자뼈 꼭지돌기",oldKr:"상항선 외측 2/3, 측두골 유양돌기"},insertion:{en:"Epicranial aponeurosis (galea aponeurotica)",newKr:"머리덮개널힘줄(모상건막)",oldKr:"모상건막"}},
{en:"Temporalis",oldKr:"측두근",newKr:"관자근",region:"머리·얼굴",origin:{en:"Temporal fossa and temporal fascia",newKr:"관자오목 및 관자근막",oldKr:"측두와 및 측두근막"},insertion:{en:"Coronoid process and anterior border of ramus of mandible",newKr:"아래턱뼈 갈고리돌기 및 가지 앞모서리",oldKr:"하악골 근돌기 및 하악지 전연"}},
{en:"Masseter",oldKr:"교근",newKr:"깨물근",region:"머리·얼굴",origin:{en:"Zygomatic arch (inferior border and medial surface)",newKr:"광대활(아래모서리 및 안쪽면)",oldKr:"관골궁(하연 및 내측면)"},insertion:{en:"Lateral surface of ramus and angle of mandible",newKr:"아래턱뼈가지 및 아래턱각 가쪽면",oldKr:"하악지 및 하악각 외측면"}},

{en:"Orbicularis Oculi",oldKr:"안륜근",newKr:"눈둘레근",region:"머리·얼굴",origin:{en:"Medial orbital margin, medial palpebral ligament, lacrimal bone",newKr:"안쪽 눈확모서리, 안쪽눈꺼풀인대, 눈물뼈",oldKr:"내측 안와연, 내안검인대, 누골"},insertion:{en:"Skin around orbit (circular); lateral palpebral raphe",newKr:"눈확 주위 피부(둥글게); 가쪽눈꺼풀솔기",oldKr:"안와 주위 피부(윤상); 외안검봉선"}},

{en:"Zygomaticus Minor",oldKr:"소관골근",newKr:"작은광대근",region:"머리·얼굴",origin:{en:"Malar surface of zygomatic bone",newKr:"광대뼈 볼면",oldKr:"관골 협골면"},insertion:{en:"Skin of upper lip (lateral to nasolabial fold)",newKr:"윗입술 피부(코입술주름 가쪽)",oldKr:"상순 피부(비순구 외측)"}},

{en:"Scalene (Posterior)",oldKr:"후사각근",newKr:"뒤목갈비근",region:"목",origin:{en:"Posterior tubercles of transverse processes of C4–C6",newKr:"C4–C6 가로돌기 뒤결절",oldKr:"C4–C6 횡돌기 후결절"},insertion:{en:"External surface of 2nd rib",newKr:"둘째갈비뼈 바깥면",oldKr:"제2늑골 외면"}},

{en:"Splenius Cervicis",oldKr:"경판상근",newKr:"목널판근",region:"목",origin:{en:"Spinous processes of T3–T6",newKr:"T3–T6 가시돌기",oldKr:"T3–T6 극돌기"},insertion:{en:"Transverse processes of C1–C3",newKr:"C1–C3 가로돌기",oldKr:"C1–C3 횡돌기"}},

{en:"Digastric",oldKr:"이복근",newKr:"두힘살근",region:"목",origin:{en:"Anterior belly: digastric fossa of mandible / Posterior belly: mastoid notch of temporal bone",newKr:"앞힘살: 아래턱뼈 두힘살오목 / 뒤힘살: 관자뼈 꼭지패임",oldKr:"전복: 하악골 이복근와 / 후복: 측두골 유돌절흔"},insertion:{en:"Intermediate tendon attached to hyoid bone (via fibrous loop)",newKr:"목뿔뼈에 붙는 중간힘줄(섬유고리를 통해)",oldKr:"설골에 부착하는 중간건(섬유고리를 통해)"}},
{en:"Mylohyoid",oldKr:"악설골근",newKr:"턱목뿔근",region:"목",origin:{en:"Mylohyoid line of mandible",newKr:"아래턱뼈 턱목뿔근선",oldKr:"하악골 악설골근선"},insertion:{en:"Body of hyoid bone, mylohyoid raphe",newKr:"목뿔뼈 몸통, 턱목뿔근솔기",oldKr:"설골체, 악설골근봉선"}},
